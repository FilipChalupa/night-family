name: CI

on:
    push:
        branches: [main]
    pull_request:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    verify:
        name: typecheck · test · web build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install
              run: npm ci

            - name: Format check
              run: npm run lint

            - name: Typecheck
              run: npm run typecheck

            - name: Test
              run: npm run test

            - name: Build web UI
              run: npm run build --workspace @night/household-web

    docker:
        name: docker build (household + member)
        runs-on: ubuntu-latest
        needs: verify
        steps:
            - uses: actions/checkout@v4

            - uses: docker/setup-buildx-action@v3

            - name: Build household image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: household/Dockerfile
                  push: false
                  load: true
                  tags: night/household:ci
                  cache-from: type=gha,scope=household
                  cache-to: type=gha,scope=household,mode=max

            - name: Build member image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: member/Dockerfile
                  push: false
                  load: true
                  tags: night/member:ci
                  cache-from: type=gha,scope=member
                  cache-to: type=gha,scope=member,mode=max
