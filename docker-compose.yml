services:
    household:
        build:
            context: .
            dockerfile: household/Dockerfile
        ports:
            - '8080:8080'
        env_file:
            - .env.household
        environment:
            DATA_DIR: /data
            CONFIG_DIR: /config
            LOG_LEVEL: info
        volumes:
            - household-data:/data
            - household-config:/config
        restart: unless-stopped
        healthcheck:
            test: ['CMD-SHELL', 'wget -q -O- http://127.0.0.1:8080/health || exit 1']
            interval: 15s
            timeout: 3s
            retries: 4

    member:
        build:
            context: .
            dockerfile: member/Dockerfile
        env_file:
            - .env.member
        environment:
            WORKSPACE_DIR: /workspace
            LOG_LEVEL: info
        volumes:
            - member-workspace:/workspace
        depends_on:
            household:
                condition: service_healthy
        restart: unless-stopped
        # ---------- sandbox flags (per plan §4 / §8) ----------
        user: '1000:1000'
        read_only: true
        tmpfs:
            - /tmp
        cap_drop:
            - ALL
        security_opt:
            - 'no-new-privileges:true'

volumes:
    household-data:
    household-config:
    member-workspace:
